name: CI/CD Pipeline VZeta

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v3

      - name: Loguearse en Docker Hub
        uses: docker/login-action@v2
            username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Construir y subir imagen myapp
        uses: docker/build-push-action@v4
        with:
          context: ./myapp
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/myapp_container:latest

      - name: Construir y subir imagen mynginx
        uses: docker/build-push-action@v4
        with:
          context: ./mynginx
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/mynginx_container:latest
