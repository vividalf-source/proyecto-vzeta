name: CI/CD Pipeline VZeta

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Loguearse en Docker Hub
        uses: docker/login-action@v3
        with:
          username: vidalvi
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 1. Compilar y subir la imagen de la Aplicacion Node
      - name: Build and push Node App image
        uses: docker/build-push-action@v5
        with:
          context: ./myapp
          file: ./myapp/Dockerfile
          push: true
          tags: vidalvi/myapp_container:latest

      # 2. Compilar y subir la imagen del Proxy Inverso Nginx (Corregido)
      - name: Build and push Nginx image
        uses: docker/build-push-action@v5
        with:
          context: ./mynginx
          file: ./mynginx/Dockerfile
          push: true
          tags: vidalvi/mynginx_container:latest
